<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Reference · Quote visual" description="REFERENCE LAYOUT — not a per-post deliverable. Read it to build a quote-type artboard, then paste that artboard as a <section class=\"visual\"> block on the Visual Board. One pulled sentence, left-aligned, attribution beneath." -->
<helmet>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
<script src="./ds-base.js"></script>
<style>
  html,body{margin:0}
  body{background:#e6e6e6;display:flex;align-items:flex-start;justify-content:center;gap:48px;padding:48px;box-sizing:border-box;min-height:100vh;flex-wrap:wrap}
</style>
</helmet>

<!-- Variant A · light canvas -->
<div data-screen-label="Quote · light" style="position:relative;width:1080px;height:1350px;box-sizing:border-box;padding:var(--margin);overflow:hidden;flex:none;
  background:var(--canvas-light-bg);color:var(--canvas-light-fg);font-family:var(--font-body);box-shadow:0 8px 40px rgba(0,0,0,.12);
  --fg:var(--canvas-light-fg);--muted:var(--canvas-light-muted);--soft:var(--canvas-light-soft)">
  <div style="position:absolute;top:var(--margin);left:var(--margin);right:var(--margin);display:flex;justify-content:space-between;align-items:center">
    <span style="font-weight:600;font-size:22px;letter-spacing:.08em">Your name</span>
    <span style="font-weight:600;font-size:22px;letter-spacing:.08em;color:var(--muted)">Category / function</span>
  </div>
  <div style="position:absolute;left:var(--margin);right:150px;top:0;bottom:0;display:flex;flex-direction:column;justify-content:center">
    <span style="font-family:var(--font-display);font-weight:700;font-size:150px;line-height:.6;color:var(--soft)">&ldquo;</span>
    <span style="font-weight:700;font-size:18px;letter-spacing:.14em;color:var(--muted);margin-top:10px">QUOTE</span>
    <p style="font-family:var(--font-display);font-weight:600;font-size:62px;line-height:1.22;letter-spacing:-.01em;margin:18px 0 0;max-width:820px;text-wrap:balance">The visual carries the save, not the caption.</p>
    <div style="display:flex;align-items:center;gap:28px;margin-top:70px">
      <span style="width:96px;height:96px;border-radius:50%;background:var(--soft);border:1.5px solid var(--canvas-light-line);display:flex;align-items:center;justify-content:center;flex:none">
        <svg width="52" height="52" viewBox="0 0 80 80" fill="none" stroke="var(--muted)" stroke-width="4"><circle cx="40" cy="30" r="15"></circle><path d="M12 72 C12 48 68 48 68 72" stroke-linecap="round"></path></svg>
      </span>
      <div style="display:flex;flex-direction:column;gap:4px">
        <span style="font-weight:700;font-size:30px">Full name</span>
        <span style="font-weight:500;font-size:24px;color:var(--muted)">Role · company</span>
      </div>
    </div>
  </div>
</div>

<!-- Variant B · section canvas (secondary colour) -->
<div data-screen-label="Quote · section" style="position:relative;width:1080px;height:1350px;box-sizing:border-box;padding:var(--margin);overflow:hidden;flex:none;
  background:var(--canvas-section-bg);color:var(--canvas-section-fg);font-family:var(--font-body);box-shadow:0 8px 40px rgba(0,0,0,.12);
  --fg:var(--canvas-section-fg);--muted:var(--canvas-section-muted);--soft:var(--canvas-section-soft)">
  <div style="position:absolute;top:var(--margin);left:var(--margin);right:var(--margin);display:flex;justify-content:space-between;align-items:center">
    <span style="font-weight:600;font-size:22px;letter-spacing:.08em">Your name</span>
    <span style="font-weight:600;font-size:22px;letter-spacing:.08em;color:var(--muted)">Category / function</span>
  </div>
  <div style="position:absolute;left:var(--margin);right:150px;top:0;bottom:0;display:flex;flex-direction:column;justify-content:center">
    <span style="font-family:var(--font-display);font-weight:700;font-size:150px;line-height:.6;color:var(--accent)">&ldquo;</span>
    <span style="font-weight:700;font-size:18px;letter-spacing:.14em;color:var(--muted);margin-top:10px">QUOTE</span>
    <p style="font-family:var(--font-display);font-weight:600;font-size:62px;line-height:1.22;letter-spacing:-.01em;margin:18px 0 0;max-width:820px;text-wrap:balance">The visual carries the save, not the caption.</p>
    <div style="display:flex;align-items:center;gap:28px;margin-top:70px">
      <span style="width:96px;height:96px;border-radius:50%;background:var(--soft);display:flex;align-items:center;justify-content:center;flex:none">
        <svg width="52" height="52" viewBox="0 0 80 80" fill="none" stroke="var(--muted)" stroke-width="4"><circle cx="40" cy="30" r="15"></circle><path d="M12 72 C12 48 68 48 68 72" stroke-linecap="round"></path></svg>
      </span>
      <div style="display:flex;flex-direction:column;gap:4px">
        <span style="font-weight:700;font-size:30px">Full name</span>
        <span style="font-weight:500;font-size:24px;color:var(--muted)">Role · company</span>
      </div>
    </div>
  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 1176, &quot;height&quot;: 780 },
  &quot;primary&quot;:   { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#0A66C2&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;secondary&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#16232B&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;accent&quot;:    { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#E7A33E&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;tint&quot;:      { &quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 7, &quot;min&quot;: 3, &quot;max&quot;: 16, &quot;tsType&quot;: &quot;number&quot; },
  &quot;font&quot;:      { &quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;Inter&quot;, &quot;options&quot;: [&quot;Inter&quot;, &quot;Plus Jakarta Sans&quot;, &quot;Space Grotesk&quot;, &quot;Sora&quot;], &quot;tsType&quot;: &quot;string&quot; }
}">
class Component extends DCLogic {
  apply() {
    const p = this.props || {};
    const r = document.documentElement.style;
    if (p.primary)   r.setProperty('--brand-primary', p.primary);
    if (p.secondary) r.setProperty('--brand-secondary', p.secondary);
    if (p.accent)    r.setProperty('--brand-accent', p.accent);
    if (p.tint != null) r.setProperty('--brand-tint', p.tint + '%');
    const font = p.font;
    if (font) {
      const id = 'tweak-font-' + font.replace(/\s+/g, '-');
      if (!document.getElementById(id)) {
        const l = document.createElement('link');
        l.id = id; l.rel = 'stylesheet';
        l.href = 'https://fonts.googleapis.com/css2?family=' + font.replace(/\s+/g, '+') + ':wght@400;500;600;700;800&display=swap';
        document.head.appendChild(l);
      }
      r.setProperty('--brand-font', "'" + font + "', system-ui, sans-serif");
      r.setProperty('--brand-font-display', "'" + font + "', system-ui, sans-serif");
    }
  }
  componentDidMount() { this.apply(); }
  componentDidUpdate() { this.apply(); }
  renderVals() { return {}; }
}
</script>
</body>
</html>
